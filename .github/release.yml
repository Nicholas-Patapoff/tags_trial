changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - question
  categories:
    - title: Breaking Changes
      labels: [breaking-change]
    - title: Features
      labels: [enhancement]
    - title: Bug Fixes
      labels: [bug]
    - title: Documentation
      labels: [documentation]
    - title: Other Changes
      labels: ["*"]
